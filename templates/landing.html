<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPORTS BRAWL | The Next Level</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff66;
            --bg: #050505;
            --surface: #111111;
            --border: #222222;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .logo span { color: var(--primary); }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #666;
            font-family: 'Archivo Black', sans-serif;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        /* FORMS */
        form { display: none; }
        form.active { display: flex; flex-direction: column; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary); outline: none; }

        /* GRID DE ROLES */
        .roles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #000;
            padding: 15px;
            border: 1px solid var(--border);
        }

        .role-option {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .role-option input { width: auto; margin-right: 10px; }

        .btn-submit {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px;
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .flash-msg {
            background: rgba(0, 255, 102, 0.1);
            color: var(--primary);
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 20px;
            border: 1px solid var(--primary);
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo">ESPORTS<span>BRAWL</span></div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'login')">LOGIN</button>
        <button class="tab-btn" onclick="openTab(event, 'reg-player')">PLAYER</button>
        <button class="tab-btn" onclick="openTab(event, 'reg-org')">ORGANIZACIÓN</button>
    </div>

    <form id="login" action="/login" method="POST" class="active">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">INICIAR SESIÓN</button>
    </form>

    <form id="reg-player" action="/registrar/player" method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Tu Nickname" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Copas Totales</label>
            <select name="copas">
                <option value="10k+">10,000+</option>
                <option value="20k+">20,000+</option>
                <option value="30k+">30,000+</option>
                <option value="50k+">50,000+</option>
                <option value="80k+">80,000+</option>
                <option value="100k+">100,000+</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rango Ranked (Max)</label>
            <select name="ranked">
                <option value="Diamante">Diamante</option>
                <option value="Mitico">Mítico</option>
                <option value="Legendario">Legendario</option>
                <option value="Master">Master</option>
                <option value="Pro">Pro</option>
            </select>
        </div>
        <label>Roles (Selecciona hasta 3)</label>
        <div class="roles-grid">
            <label class="role-option"><input type="checkbox" name="roles" value="Asesino">Asesino</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Tanque">Tanque</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Control">Control</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Destructor">Destructor</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Sniper">Sniper</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Lanzador">Lanzador</label>
        </div>
        <button type="submit" class="btn-submit">CREAR CUENTA PROFESIONAL</button>
    </form>

    <form id="reg-org" action="/registrar/org" method="POST">
        <div class="form-group">
            <label>Admin Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Nombre de la Organización</label>
            <input type="text" name="org_name" required>
        </div>
        <div class="form-group">
            <label>TAG (3 letras)</label>
            <input type="text" name="tag" maxlength="3" placeholder="Ej: T1" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">FUNDAR ORG (10M Presupuesto)</button>
    </form>
</div>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByTagName("form");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        document.getElementById(tabName).style.display = "flex";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // Limitar a 3 checkboxes
    const checkboxes = document.querySelectorAll('input[name="roles"]');
    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            const checked = document.querySelectorAll('input[name="roles"]:checked');
            if (checked.length > 3) {
                cb.checked = False;
                alert("Máximo 3 roles permitidos");
            }
        });
    });
</script>

</body>
</html>
